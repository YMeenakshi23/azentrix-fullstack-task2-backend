version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: notes-postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: notes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 2200032487
    volumes:
      - pgdata:/var/lib/postgresql/data

  notes-api:
    build: .
    container_name: notes-api-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notes-postgres-db:5432/notes_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=2200032487
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

volumes:
  pgdata: